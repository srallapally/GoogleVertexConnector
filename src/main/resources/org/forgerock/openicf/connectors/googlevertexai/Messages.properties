# =============================================================================
# Google Vertex AI ICF Connector - Display & Help Messages
# =============================================================================

# ---- Connector ----
googlevertexai.connector.display=Google Vertex AI Connector
connector.help=Connector that inventories AI agents, tools, data stores, and IAM bindings via Dialogflow CX or Vertex AI Agent Engine APIs.

# ---- Configuration Properties ----
projectId.display=GCP Project ID
projectId.help=Google Cloud project ID where agents are deployed.

location.display=Location
location.help=GCP region for the API, e.g. us-central1 or global.

agentApiFlavor.display=Agent API Flavor
agentApiFlavor.help=Which Google Cloud agent API to use. 'dialogflowcx' for Dialogflow CX agents (default). 'vertexai' for Vertex AI Agent Engine (reasoningEngines). When using 'vertexai', the agentTool and agentKnowledgeBase object classes return empty results as these are not exposed as sub-resources.

useWorkloadIdentity.display=Use Workload Identity
useWorkloadIdentity.help=If true, authenticate using Application Default Credentials (ADC) or Workload Identity Federation. If false, a service account key JSON is required.

serviceAccountKeyJson.display=Service Account Key JSON
serviceAccountKeyJson.help=Full JSON key file content for a GCP service account. Required when useWorkloadIdentity is false.

identityBindingScanEnabled.display=Identity Binding Scan Enabled
identityBindingScanEnabled.help=When enabled, the connector calls getIamPolicy on each agent to discover IAM bindings. Requires appropriate IAM permissions.

agentNameFilterRegex.display=Agent Name Filter Regex
agentNameFilterRegex.help=Optional regular expression to filter which agents are returned during discovery based on displayName.